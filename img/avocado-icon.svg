<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a8c3f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="skin" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#3a7a4a"/>
      <stop offset="60%" stop-color="#2a6a3a"/>
      <stop offset="100%" stop-color="#1a5a2a"/>
    </radialGradient>
    <radialGradient id="flesh" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c8e850"/>
      <stop offset="40%" stop-color="#a8d840"/>
      <stop offset="100%" stop-color="#88c030"/>
    </radialGradient>
    <radialGradient id="seed-g" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c49a6c"/>
      <stop offset="50%" stop-color="#a07850"/>
      <stop offset="100%" stop-color="#7a5830"/>
    </radialGradient>
    <filter id="avo-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#avo-shadow)" transform="translate(50,50) rotate(-8) translate(-50,-50)">
    <!-- Outer skin -->
    <ellipse cx="50" cy="52" rx="34" ry="40" fill="url(#skin)"/>
    <!-- Skin highlight -->
    <ellipse cx="42" cy="40" rx="18" ry="22" fill="rgba(255,255,255,0.08)"/>
    <!-- Inner flesh - cut face -->
    <ellipse cx="50" cy="52" rx="28" ry="34" fill="url(#flesh)"/>
    <!-- Flesh highlight -->
    <ellipse cx="44" cy="42" rx="14" ry="18" fill="rgba(255,255,255,0.15)"/>
    <!-- Seed -->
    <ellipse cx="50" cy="54" rx="12" ry="14" fill="url(#seed-g)"/>
    <!-- Seed highlight -->
    <ellipse cx="46" cy="48" rx="5" ry="6" fill="rgba(255,255,255,0.2)"/>
    <!-- Seed shadow -->
    <ellipse cx="54" cy="60" rx="6" ry="4" fill="rgba(0,0,0,0.1)"/>
  </g>
</svg>

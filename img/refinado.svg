<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" width="200" height="500">
  <defs>
    <linearGradient id="bottle-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="30%" stop-color="#2d3d2a"/>
      <stop offset="50%" stop-color="#3a4a35"/>
      <stop offset="70%" stop-color="#2d3d2a"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="cap-ref" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="label-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <filter id="shadow1"><feDropShadow dx="3" dy="6" stdDeviation="8" flood-opacity="0.3"/></filter>
  </defs>
  <!-- Shadow -->
  <g filter="url(#shadow1)">
    <!-- Bottle neck -->
    <rect x="82" y="20" width="36" height="70" rx="4" fill="url(#bottle-dark)"/>
    <!-- Cap -->
    <rect x="78" y="8" width="44" height="28" rx="6" fill="url(#cap-ref)"/>
    <rect x="80" y="4" width="40" height="8" rx="4" fill="#333"/>
    <!-- Bottle shoulder -->
    <path d="M82 90 Q82 120 55 140 L55 420 Q55 445 80 445 L120 445 Q145 445 145 420 L145 140 Q118 120 118 90 Z" fill="url(#bottle-dark)"/>
    <!-- Bottle base -->
    <rect x="50" y="440" width="100" height="16" rx="6" fill="#1a2a1a"/>
  </g>
  <!-- Label -->
  <rect x="58" y="160" width="84" height="250" rx="4" fill="url(#label-bg)" stroke="#ddd" stroke-width="0.5"/>
  <!-- Label content -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a">Aceite de</text>
  <text x="100" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a">Aguacate Hass</text>
  <!-- REFINADO text -->
  <text x="100" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#c8a951" letter-spacing="2">REFINADO</text>
  <text x="100" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#666">100% puro</text>
  <!-- Avocado icon -->
  <g transform="translate(80,240) scale(0.4)">
    <path d="M50 0 C20 0 0 30 0 60 C0 90 20 100 50 100 C80 100 100 90 100 60 C100 30 80 0 50 0Z" fill="#1a1a1a"/>
    <circle cx="50" cy="55" r="15" fill="#333"/>
    <path d="M40 20 C30 30 25 50 35 70 Q45 80 55 60 Q60 40 50 25Z" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Colombian flag stripe -->
  <rect x="58" y="290" width="28" height="3" rx="1" fill="#f5c518"/>
  <rect x="86" y="290" width="28" height="3" rx="1" fill="#0033a0"/>
  <rect x="114" y="290" width="28" height="3" rx="1" fill="#ce1126"/>
  <!-- Contiene -->
  <rect x="68" y="302" width="64" height="14" rx="7" fill="#1a1a1a"/>
  <text x="100" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fff">Contiene:</text>
  <!-- Nutrients -->
  <text x="100" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2d5a27">Vitamina E</text>
  <text x="100" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2d5a27">Fitosteroles</text>
  <text x="100" y="354" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2d5a27">Acido oleico</text>
  <text x="100" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2d5a27">Omega 3-6-9</text>
  <!-- Bera logo on label -->
  <g transform="translate(70,375)">
    <text x="0" y="12" font-family="Georgia,serif" font-size="10" font-weight="bold"><tspan fill="#1a1a1a">B</tspan><tspan fill="#f5c518">e</tspan></text>
    <text x="0" y="24" font-family="Georgia,serif" font-size="10" font-weight="bold"><tspan fill="#0033a0">r</tspan><tspan fill="#ce1126">a</tspan></text>
    <text x="24" y="24" font-family="Arial,sans-serif" font-size="5" fill="#888" letter-spacing="1">HASS</text>
  </g>
  <!-- 250ml badge -->
  <rect x="72" y="400" width="56" height="16" rx="3" fill="#1a1a1a"/>
  <text x="100" y="412" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff">250 ml</text>
</svg>
